<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>Mi Rutina & Menú</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;
  --surface:#0E0E12;
  --surface2:#14141A;
  --border:#1E1E28;
  --text:#F0EEF8;
  --muted:#5A5870;
  --pink:#FF6B9D;
  --orange:#FF8C42;
  --teal:#4ECDC4;
  --blue:#7EB3D4;
  --purple:#C77DFF;
  --gray:#4A4A5A;
  --green:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overscroll-behavior:none;}
::-webkit-scrollbar{width:0;}

/* ─── layout ──────────────────────────────── */
.shell{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;}
.topbar{flex-shrink:0;padding:18px 20px 0;}
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 24px;}
.bottomnav{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.5px;cursor:pointer;padding:6px 0;transition:color .2s;}
.nav-btn.active{color:var(--pink);}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;}

/* ─── topbar ──────────────────────────────── */
.brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.brand-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;letter-spacing:-0.5px;color:var(--text);}
.brand-title span{color:var(--pink);}
.week-badge{font-size:10px;color:var(--muted);letter-spacing:1.5px;background:var(--surface2);border:1px solid var(--border);padding:5px 10px;border-radius:20px;}

/* start-date bar */
.date-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px;}
.date-bar label{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.date-bar input[type=date]{background:none;border:none;color:var(--pink);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;outline:none;cursor:pointer;margin-left:auto;}
.date-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(60%) sepia(80%) saturate(500%) hue-rotate(295deg);}

/* week progress */
.week-prog{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.week-prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:2px;transition:width .5s ease;}
.week-prog-label{font-size:10px;color:var(--muted);min-width:36px;text-align:right;}

/* ─── day tabs ────────────────────────────── */
.day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
.day-tab{flex-shrink:0;border:1px solid var(--border);background:var(--surface2);border-radius:12px;padding:8px 12px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--muted);transition:all .2s;min-width:62px;text-align:center;}
.day-tab .tab-num{font-size:13px;font-weight:700;display:block;margin-bottom:1px;}
.day-tab .tab-date{font-size:9px;font-weight:400;display:block;}
.day-tab .tab-dot{width:6px;height:6px;border-radius:50%;background:var(--border);margin:4px auto 0;transition:all .2s;}
.day-tab.active{border-color:var(--accent,var(--pink));color:var(--text);background:color-mix(in srgb,var(--accent,var(--pink)) 12%,transparent);}
.day-tab.active .tab-dot{background:var(--accent,var(--pink));}
.day-tab.done .tab-dot{background:var(--green);}

/* ─── day header card ─────────────────────── */
.day-header{border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.day-header::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;border-radius:50%;background:var(--accent,var(--pink));opacity:.08;pointer-events:none;}
.day-header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.day-label{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--accent,var(--pink));margin-bottom:4px;}
.day-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.1;color:var(--text);}
.day-date-display{font-size:12px;color:var(--muted);margin-top:4px;}
.day-emoji{font-size:36px;line-height:1;}
.day-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);}
.day-prog-wrap{margin-top:14px;}
.day-prog-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.day-prog-row span{font-size:11px;color:var(--muted);}
.day-prog-row strong{font-size:11px;color:var(--accent,var(--pink));font-weight:600;}
.day-prog-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.day-prog-fill{height:100%;border-radius:3px;transition:width .4s ease;}

/* ─── rest day ────────────────────────────── */
.rest-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px;text-align:center;margin-bottom:14px;}
.rest-block p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;}

/* ─── section label ───────────────────────── */
.section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--accent,var(--pink));margin:16px 0 8px;padding-left:2px;opacity:.8;}

/* ─── exercise card ───────────────────────── */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:border-color .3s,background .3s;}
.ex-card.completed{border-color:color-mix(in srgb,var(--accent,var(--pink)) 40%,transparent);background:color-mix(in srgb,var(--accent,var(--pink)) 5%,var(--surface));}
.ex-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.ex-info{flex:1;}
.ex-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.2;}
.ex-card.completed .ex-name{color:var(--accent,var(--pink));text-decoration:line-through;opacity:.7;}
.ex-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.kg-wrap{display:flex;align-items:center;gap:4px;}
.kg-label{font-size:9px;color:var(--muted);letter-spacing:1px;}
.kg-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--accent,var(--pink));font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;width:52px;padding:6px 8px;text-align:center;outline:none;transition:border-color .2s;}
.kg-input:focus{border-color:var(--accent,var(--pink));}
.kg-input::placeholder{color:var(--muted);font-weight:400;}
.sets-row{display:flex;gap:7px;flex-wrap:wrap;}
.set-btn{width:36px;height:36px;border-radius:9px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;}
.set-btn.done{border-color:var(--accent,var(--pink));background:var(--accent,var(--pink));color:#000;font-size:15px;box-shadow:0 0 12px color-mix(in srgb,var(--accent,var(--pink)) 50%,transparent);}
.set-btn.pop{transform:scale(1.4);}
.set-btn.inactive{opacity:.25;cursor:default;}

/* reset btn */
.reset-btn{width:100%;background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px;font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.5px;cursor:pointer;margin-top:4px;transition:all .2s;}
.reset-btn:hover{border-color:var(--muted);color:var(--text);}

/* ─── habits section ──────────────────────── */
.habits-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.habits-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.habits-row{display:flex;gap:8px;flex-wrap:wrap;}
.habit-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none;}
.habit-chip.done{border-color:var(--green);color:var(--green);background:color-mix(in srgb,var(--green) 8%,transparent);}

/* ─── MENU section ────────────────────────── */
.menu-wrap{padding-top:4px;}
.menu-day-sel{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px;}
.menu-day-sel label{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.menu-day-sel select{background:none;border:none;color:var(--pink);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;outline:none;cursor:pointer;margin-left:auto;}
.menu-day-sel select option{background:#1a1a2e;color:var(--text);}

.meal-section{margin-bottom:20px;}
.meal-section-title{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--pink);margin-bottom:10px;padding-left:2px;}
.meal-cards{display:flex;flex-direction:column;gap:8px;}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.meal-card:hover{border-color:var(--border);background:var(--surface2);}
.meal-card.chosen{border-color:var(--pink);background:color-mix(in srgb,var(--pink) 8%,var(--surface));}
.meal-num{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s;}
.meal-card.chosen .meal-num{background:var(--pink);border-color:var(--pink);color:#000;}
.meal-text{font-size:13px;color:var(--text);line-height:1.4;}
.meal-card.chosen .meal-text{color:var(--pink);}

.snack-chips{display:flex;flex-wrap:wrap;gap:8px;}
.snack-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;}
.snack-chip.chosen{border-color:var(--orange);color:var(--orange);background:color-mix(in srgb,var(--orange) 8%,transparent);}

.portions-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:4px;}
.portions-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.portion-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);}
.portion-row:last-child{border-bottom:none;}
.portion-icon{font-size:18px;width:28px;text-align:center;}
.portion-label{font-size:12px;color:var(--text);flex:1;}
.portion-qty{font-size:11px;color:var(--muted);}

/* ─── menu saved indicator ────────────────── */
.menu-saved-bar{background:color-mix(in srgb,var(--green) 10%,transparent);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--green);text-align:center;margin-bottom:14px;display:none;}
.menu-saved-bar.show{display:block;}

/* ─── page visibility ─────────────────────── */
.page{display:none;}
.page.active{display:block;}

/* ─── animations ──────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page.active .day-header,.page.active .ex-card{animation:fadeUp .3s ease both;}
.page.active .ex-card:nth-child(1){animation-delay:.04s}
.page.active .ex-card:nth-child(2){animation-delay:.07s}
.page.active .ex-card:nth-child(3){animation-delay:.10s}
.page.active .ex-card:nth-child(4){animation-delay:.13s}
</style>
</head>
<body>
<div class="shell">

  <!-- ─── TOP BAR ─────────────────────────── -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-title">rutina<span>.</span></div>
      <div class="week-badge" id="weekBadge">0 / 6 días</div>
    </div>
    <div class="date-bar">
      <label>INICIO DE CICLO</label>
      <input type="date" id="startDate" onchange="onStartChange()"/>
    </div>
    <div class="week-prog">
      <div class="week-prog-bar"><div class="week-prog-fill" id="weekProgFill" style="width:0%"></div></div>
      <div class="week-prog-label" id="weekProgLabel">0%</div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <!-- ─── SCROLL AREA ──────────────────────── -->
  <div class="scroll-area" id="scrollArea">
    <!-- Workout page -->
    <div class="page active" id="pageWorkout"></div>
    <!-- Menu page -->
    <div class="page" id="pageMenu"></div>
  </div>

  <!-- ─── BOTTOM NAV ───────────────────────── -->
  <div class="bottomnav">
    <button class="nav-btn active" id="navWorkout" onclick="switchPage('workout')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4v6M6 14v6M18 4v6M18 14v6M3 7h6M15 7h6M3 17h6M15 17h6"/></svg>
      RUTINA
    </button>
    <button class="nav-btn" id="navMenu" onclick="switchPage('menu')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18"/><circle cx="7" cy="6" r="1.5" fill="currentColor"/><circle cx="7" cy="12" r="1.5" fill="currentColor"/><circle cx="7" cy="18" r="1.5" fill="currentColor"/></svg>
      MENÚ
    </button>
  </div>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────
const DAYS = [
  {
    id:1, emoji:"🍑", title:"Glúteo Fuerte", accent:"#FF6B9D",
    note:"Día más importante — crecimiento 🍑",
    sections:[
      {name:"ACTIVACIÓN", exercises:[
        {id:"d1e1", name:"Abducción",          sets:2, reps:"20 reps"},
      ]},
      {name:"ENTRENAMIENTO", exercises:[
        {id:"d1e2", name:"Hip Thrust",         sets:4, reps:"8 reps (pesado)"},
        {id:"d1e3", name:"Sentadilla",         sets:3, reps:"8–10 reps"},
        {id:"d1e4", name:"Peso muerto rumano", sets:3, reps:"10 reps"},
        {id:"d1e5", name:"Patada de glúteo",   sets:2, reps:"12 reps"},
        {id:"d1e6", name:"Abducción",          sets:2, reps:"20 reps"},
      ]},
    ]
  },
  {
    id:2, emoji:"🔥", title:"Cardio + Core", accent:"#FF8C42",
    note:"Cintura — enfócate en el vacuum",
    sections:[
      {name:"CARDIO", exercises:[
        {id:"d2e1", name:"Caminadora inclinada", sets:1, reps:"30 min"},
      ]},
      {name:"CORE", exercises:[
        {id:"d2e2", name:"Plancha",     sets:3, reps:"40 seg"},
        {id:"d2e3", name:"Elevaciones", sets:3, reps:"15 reps"},
        {id:"d2e4", name:"Vacuum",      sets:1, reps:"5 min"},
      ]},
    ]
  },
  {
    id:3, emoji:"💪", title:"Espalda Estética", accent:"#4ECDC4",
    note:"Peso moderado — enfoque técnico. No es espalda masculina.",
    sections:[
      {name:"ESPALDA", exercises:[
        {id:"d3e1", name:"Jalón al pecho",     sets:3, reps:"12 reps"},
        {id:"d3e2", name:"Remo en máquina",    sets:3, reps:"12 reps"},
        {id:"d3e3", name:"Remo con mancuerna", sets:3, reps:"10 reps"},
        {id:"d3e4", name:"Face pull",          sets:3, reps:"15 reps"},
      ]},
    ]
  },
  {
    id:4, emoji:"😌", title:"Descanso Activo", accent:"#7EB3D4",
    isRest:true,
    sections:[
      {name:"OPCIONAL", exercises:[
        {id:"d4e1", name:"Caminata",         sets:1, reps:"20–30 min"},
        {id:"d4e2", name:"Vacuum (opcional)", sets:1, reps:"5–10 min"},
      ]},
    ]
  },
  {
    id:5, emoji:"🍑", title:"Glúteo + Pierna", accent:"#FF6B9D",
    sections:[
      {name:"ACTIVACIÓN", exercises:[
        {id:"d5e1", name:"Abducción", sets:2, reps:"20 reps"},
      ]},
      {name:"ENTRENAMIENTO", exercises:[
        {id:"d5e2", name:"Hip Thrust",       sets:3, reps:"10 reps"},
        {id:"d5e3", name:"Prensa",           sets:3, reps:"12 reps"},
        {id:"d5e4", name:"Desplantes",       sets:3, reps:"10 reps"},
        {id:"d5e5", name:"Patada de glúteo", sets:3, reps:"15 reps"},
      ]},
    ]
  },
  {
    id:6, emoji:"🍑", title:"Glúteo Forma", accent:"#C77DFF",
    note:"Conexión mente-músculo — más ligero, más controlado",
    sections:[
      {name:"LIGERO & CONTROLADO", exercises:[
        {id:"d6e1", name:"Sentadilla sumo",   sets:3, reps:"12 reps"},
        {id:"d6e2", name:"Peso muerto ligero",sets:3, reps:"12 reps"},
        {id:"d6e3", name:"Step ups",          sets:3, reps:"10 reps"},
        {id:"d6e4", name:"Patada de glúteo",  sets:3, reps:"15 reps"},
        {id:"d6e5", name:"Abducción",         sets:2, reps:"20 reps"},
      ]},
    ]
  },
  {
    id:7, emoji:"😴", title:"Descanso Total", accent:"#4A4A5A",
    isFullRest:true, sections:[]
  }
];

const DAILY_HABITS = [
  {id:"hab1", label:"💧 Agua"},
  {id:"hab2", label:"🌀 Vacuum"},
  {id:"hab3", label:"😴 Dormir bien"},
];

const MENU = {
  desayunos:[
    "Yogur + cereal integral + plátano + semillas",
    "Pan tostado + huevo + aguacate",
    "Huevos con verduras",
    "Yogur + melón + semillas",
  ],
  comidas:[
    "Pollo + arroz + verduras + aguacate",
    "Ensalada: lechuga + jitomate + atún/pollo + aguacate + semillas",
    "Pasta + pollo o atún + verduras",
    "Tostadas horneadas + atún/pollo + verduras + aguacate",
  ],
  cenas:[
    "Ensalada + queso panela o huevo",
    "Huevos + verduras",
    "Atún + verduras + aguacate",
  ],
  snacks:[
    "Yogur + almendras",
    "Melón",
    "Almendras o semillas",
    "Fruta + semillas",
  ],
  extras:[
    "Gelatina light 🍮",
  ],
  bebidas:[
    "Agua 💧",
    "Café ☕",
    "Té 🍵",
  ],
};

const PORCIONES = [
  {icon:"🍗", label:"Proteína", qty:"Tamaño de tu palma"},
  {icon:"🍚", label:"Carbohidrato", qty:"1 puño"},
  {icon:"🥑", label:"Grasa", qty:"1 dedo"},
];

// ── STATE ────────────────────────────────────────────────────────
let activeDay = 0;
let activePage = "workout";
let menuDay = 1;

let S = {
  startDate: "",
  completed: {},
  weights: {},
  habits: {},
  menuChoices: {},   // { "day1-d": 0, "day1-c": 2, ... }
};

function save(){ try{ localStorage.setItem("rz2025", JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem("rz2025");
    if(raw) S = {...S, ...JSON.parse(raw)};
  }catch(e){}
}

// ── DATE HELPERS ─────────────────────────────────────────────────
function getStartDate(){
  if(!S.startDate) return null;
  const [y,m,d] = S.startDate.split("-").map(Number);
  return new Date(y,m-1,d);
}
function dayDate(dayIdx){
  const s = getStartDate();
  if(!s) return null;
  const d = new Date(s);
  d.setDate(d.getDate() + dayIdx);
  return d;
}
function fmtDate(d){
  if(!d) return "";
  const opts = {day:"numeric",month:"short"};
  return d.toLocaleDateString("es-MX", opts);
}
function onStartChange(){
  S.startDate = document.getElementById("startDate").value;
  save();
  renderAll();
}

// ── PROGRESS HELPERS ─────────────────────────────────────────────
function dayProgress(day){
  if(day.isFullRest) return null;
  let total=0, done=0;
  day.sections.forEach(s=>s.exercises.forEach(e=>{
    for(let i=0;i<e.sets;i++){total++;if(S.completed[`${e.id}-${i}`])done++;}
  }));
  return total?{total,done,pct:Math.round(done/total*100)}:null;
}
function weekDone(){
  return DAYS.filter((d,i)=>i<6&&dayProgress(d)?.pct===100).length;
}

// ── RENDER TABS ───────────────────────────────────────────────────
function renderTabs(){
  const el = document.getElementById("dayTabs");
  el.innerHTML = DAYS.map((d,i)=>{
    const p = dayProgress(d);
    const isDone = p&&p.pct===100;
    const isActive = i===activeDay;
    const dd = dayDate(i);
    const dateStr = dd?fmtDate(dd):"";
    let cls = "day-tab";
    if(isActive) cls+=" active";
    if(isDone&&!isActive) cls+=" done";
    return `<button class="${cls}" style="--accent:${d.accent}" onclick="setDay(${i})">
      <span class="tab-num">${d.emoji} D${d.id}</span>
      <span class="tab-date">${dateStr||"—"}</span>
      <div class="tab-dot"></div>
    </button>`;
  }).join("");
}

// ── RENDER WEEK HEADER ────────────────────────────────────────────
function renderWeekHeader(){
  const done = weekDone();
  const pct = Math.round((done/6)*100);
  document.getElementById("weekBadge").textContent = `${done} / 6 días`;
  document.getElementById("weekProgFill").style.width = pct+"%";
  document.getElementById("weekProgLabel").textContent = pct+"%";
}

// ── RENDER WORKOUT PAGE ───────────────────────────────────────────
function renderWorkout(){
  const page = document.getElementById("pageWorkout");
  const day = DAYS[activeDay];
  const prog = dayProgress(day);
  const dd = dayDate(activeDay);
  const accent = day.accent;
  let html = "";

  // day header
  html += `<div class="day-header" style="background:color-mix(in srgb,${accent} 8%,var(--surface));border:1px solid color-mix(in srgb,${accent} 20%,transparent);">
    <div class="day-header-top">
      <div>
        <div class="day-label">DÍA ${day.id}</div>
        <div class="day-name">${day.title}</div>
        <div class="day-date-display">${dd?fmtDate(dd):"Configura una fecha de inicio"}</div>
      </div>
      <div class="day-emoji">${day.emoji}</div>
    </div>`;
  if(day.note) html+=`<div class="day-note">${day.note}</div>`;
  if(prog){
    html+=`<div class="day-prog-wrap">
      <div class="day-prog-row"><span>Progreso</span><strong>${prog.done}/${prog.total} series ${prog.pct===100?"✅":""}</strong></div>
      <div class="day-prog-bar"><div class="day-prog-fill" style="width:${prog.pct}%;background:${accent};box-shadow:0 0 8px ${accent}60;"></div></div>
    </div>`;
  }
  html += `</div>`;

  // full rest
  if(day.isFullRest){
    html+=`<div class="rest-block">
      <div style="font-size:50px">😴</div>
      <p style="font-family:'Playfair Display',serif;font-size:18px;color:var(--muted);margin-top:8px;">HOY DESCANSAS</p>
      <p>Sin pesas. Solo relajarte.<br>El descanso también construye 💆‍♀️</p>
    </div>`;
    // still show habits
    html += renderHabitsHTML(accent);
    page.innerHTML = html;
    return;
  }

  // sections
  day.sections.forEach(sec=>{
    html+=`<div class="section-lbl" style="color:${accent}">▸ ${sec.name}</div>`;
    sec.exercises.forEach(ex=>{
      const allDone = Array.from({length:ex.sets},(_,i)=>S.completed[`${ex.id}-${i}`]).every(Boolean);
      html+=`<div class="ex-card${allDone?" completed":""}" id="ex-${ex.id}" style="--accent:${accent}">
        <div class="ex-top">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.sets} series · ${ex.reps}</div>
          </div>
          <div class="kg-wrap">
            <div class="kg-label">KG</div>
            <input class="kg-input" type="text" inputmode="decimal" placeholder="—"
              style="--accent:${accent}"
              value="${S.weights[ex.id]||''}"
              oninput="onKg('${ex.id}',this.value)"/>
          </div>
        </div>
        <div class="sets-row">`;
      for(let i=0;i<ex.sets;i++){
        const k=`${ex.id}-${i}`;
        const done=!!S.completed[k];
        html+=`<button class="set-btn${done?" done":""}" id="sb-${k}"
          style="${done?`background:${accent};border-color:${accent};box-shadow:0 0 10px ${accent}50;color:#000;`:""}"
          onclick="onSet('${ex.id}',${i},'${accent}')">${done?"✓":i+1}</button>`;
      }
      html+=`</div></div>`;
    });
  });

  html += renderHabitsHTML(accent);

  // reset btn
  if(prog&&prog.done>0){
    html+=`<button class="reset-btn" onclick="resetDay(${activeDay})">↺ Reiniciar día</button>`;
  }

  page.innerHTML = html;
}

function renderHabitsHTML(accent){
  const dateKey = `d${activeDay}`;
  let html = `<div class="habits-card" style="margin-top:4px;">
    <div class="habits-title">HÁBITOS DEL DÍA</div>
    <div class="habits-row">`;
  DAILY_HABITS.forEach(h=>{
    const key = `${dateKey}-${h.id}`;
    const done = !!S.habits[key];
    html+=`<div class="habit-chip${done?" done":""}" onclick="onHabit('${key}')">${h.label}</div>`;
  });
  html+=`</div></div>`;
  return html;
}

// ── RENDER MENU PAGE ──────────────────────────────────────────────
function renderMenu(){
  const page = document.getElementById("pageMenu");
  const mk = `day${menuDay}`;

  let days = DAYS.slice(0,6).map((d,i)=>{
    const dd = dayDate(i);
    const label = `Día ${d.id}${dd?" — "+fmtDate(dd):""}`;
    return `<option value="${d.id}"${menuDay===d.id?" selected":""}>${label}</option>`;
  }).join("");

  let html = `<div class="menu-wrap">
    <div class="menu-day-sel">
      <label>VER MENÚ PARA</label>
      <select onchange="menuDay=+this.value;renderMenu();">${days}</select>
    </div>`;

  const d_key = `${mk}-d`;
  const c_key = `${mk}-c`;
  const ce_key = `${mk}-ce`;

  // Desayunos
  html+=`<div class="meal-section">
    <div class="meal-section-title">🍳 DESAYUNO — elige 1</div>
    <div class="meal-cards">`;
  MENU.desayunos.forEach((m,i)=>{
    const chosen = S.menuChoices[d_key]===i;
    html+=`<div class="meal-card${chosen?" chosen":""}" onclick="onMeal('${d_key}',${i})">
      <div class="meal-num">${i+1}</div>
      <div class="meal-text">${m}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Comidas
  html+=`<div class="meal-section">
    <div class="meal-section-title">🌮 COMIDA — elige 1</div>
    <div class="meal-cards">`;
  MENU.comidas.forEach((m,i)=>{
    const chosen = S.menuChoices[c_key]===i;
    html+=`<div class="meal-card${chosen?" chosen":""}" onclick="onMeal('${c_key}',${i})">
      <div class="meal-num">${i+1}</div>
      <div class="meal-text">${m}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Cenas
  html+=`<div class="meal-section">
    <div class="meal-section-title" style="color:var(--purple)">🌙 CENA — elige 1</div>
    <div class="meal-cards">`;
  MENU.cenas.forEach((m,i)=>{
    const chosen = S.menuChoices[ce_key]===i;
    html+=`<div class="meal-card${chosen?" chosen":""}" style="--pink:var(--purple)" onclick="onMeal('${ce_key}',${i})">
      <div class="meal-num" style="${S.menuChoices[ce_key]===i?"background:var(--purple);border-color:var(--purple)":""}">
      ${i+1}</div>
      <div class="meal-text" style="${S.menuChoices[ce_key]===i?"color:var(--purple)":""}"> ${m}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Snacks
  html+=`<div class="meal-section">
    <div class="meal-section-title" style="color:var(--orange)">🥜 SNACK — elige 1</div>
    <div class="snack-chips">`;
  MENU.snacks.forEach((s,i)=>{
    const sk = `${mk}-s${i}`;
    const chosen = !!S.menuChoices[sk];
    html+=`<div class="snack-chip${chosen?" chosen":""}" onclick="onSnack('${sk}')">${s}</div>`;
  });
  html+=`</div></div>`;

  // Extras
  html+=`<div class="meal-section">
    <div class="meal-section-title" style="color:var(--teal)">🍮 EXTRA — antojo sin culpa</div>
    <div class="snack-chips">`;
  MENU.extras.forEach((s,i)=>{
    const ek = `${mk}-ex${i}`;
    const chosen = !!S.menuChoices[ek];
    html+=`<div class="snack-chip${chosen?" chosen":""}" style="${chosen?"border-color:var(--teal);color:var(--teal);background:color-mix(in srgb,var(--teal) 8%,transparent)":""}" onclick="onSnack('${ek}')">${s}</div>`;
  });
  html+=`</div></div>`;

  // Bebidas
  html+=`<div class="meal-section">
    <div class="meal-section-title" style="color:var(--blue)">☕ BEBIDAS — sin azúcar</div>
    <div class="snack-chips">`;
  MENU.bebidas.forEach((s,i)=>{
    const bk = `${mk}-b${i}`;
    const chosen = !!S.menuChoices[bk];
    html+=`<div class="snack-chip${chosen?" chosen":""}" style="${chosen?"border-color:var(--blue);color:var(--blue);background:color-mix(in srgb,var(--blue) 8%,transparent)":""}" onclick="onSnack('${bk}')">${s}</div>`;
  });
  html+=`</div></div>`;

  // Reglas
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:10px;">⚖️ REGLAS QUE NO FALLAN</div>
    ${[["🍗","Proteína en cada comida"],["🌙","Cena siempre ligera"],["🥑","Aguacate moderado"],["🍚","Carbos (arroz/pasta) → 1 vez al día"]].map(([ic,tx])=>`<div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);"><span style="font-size:15px">${ic}</span><span style="font-size:12px;color:var(--muted)">${tx}</span></div>`).join("")}
  </div>`;

  // Porciones
  html+=`<div class="portions-card">
    <div class="portions-title">⚖️ GUÍA DE PORCIONES</div>`;
  PORCIONES.forEach(p=>{
    html+=`<div class="portion-row">
      <div class="portion-icon">${p.icon}</div>
      <div class="portion-label">${p.label}</div>
      <div class="portion-qty">${p.qty}</div>
    </div>`;
  });
  html+=`</div>

  <div style="margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:10px;">⏱ RESULTADOS ESPERADOS</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="font-size:11px;font-weight:700;color:var(--teal);min-width:70px;">2 semanas</div>
        <div style="font-size:11px;color:var(--muted);">Te desinflamas</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="font-size:11px;font-weight:700;color:var(--orange);min-width:70px;">4 semanas</div>
        <div style="font-size:11px;color:var(--muted);">Ya te ves diferente</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="font-size:11px;font-weight:700;color:var(--pink);min-width:70px;">8–12 semanas</div>
        <div style="font-size:11px;color:var(--muted);">Cambio fuerte 🔥</div>
      </div>
    </div>
  </div>
  </div>`;

  page.innerHTML = html;
}

// ── EVENTS ────────────────────────────────────────────────────────
function onSet(exId, idx, accent){
  const k = `${exId}-${idx}`;
  S.completed[k] = !S.completed[k];
  save();

  const btn = document.getElementById(`sb-${k}`);
  if(btn){
    btn.classList.add("pop");
    setTimeout(()=>btn.classList.remove("pop"),300);
  }
  renderAll();
}

function onKg(exId, val){
  S.weights[exId] = val;
  save();
}

function onHabit(key){
  S.habits[key] = !S.habits[key];
  save();
  renderWorkout();
}

function onMeal(key, idx){
  if(S.menuChoices[key]===idx) delete S.menuChoices[key];
  else S.menuChoices[key] = idx;
  save();
  renderMenu();
}

function onSnack(key){
  S.menuChoices[key] = !S.menuChoices[key];
  save();
  renderMenu();
}

function setDay(idx){
  activeDay = idx;
  renderAll();
  document.getElementById("scrollArea").scrollTop = 0;
}

function resetDay(dayIdx){
  DAYS[dayIdx].sections.forEach(s=>s.exercises.forEach(e=>{
    for(let i=0;i<e.sets;i++) delete S.completed[`${e.id}-${i}`];
  }));
  save();
  renderAll();
}

function switchPage(p){
  activePage = p;
  document.getElementById("pageWorkout").classList.toggle("active", p==="workout");
  document.getElementById("pageMenu").classList.toggle("active", p==="menu");
  document.getElementById("navWorkout").classList.toggle("active", p==="workout");
  document.getElementById("navMenu").classList.toggle("active", p==="menu");
  document.getElementById("dayTabs").style.display = p==="workout"?"flex":"none";
  if(p==="menu") renderMenu();
  document.getElementById("scrollArea").scrollTop = 0;
}

function renderAll(){
  renderWeekHeader();
  renderTabs();
  renderWorkout();
}

// ── INIT ──────────────────────────────────────────────────────────
load();
if(S.startDate) document.getElementById("startDate").value = S.startDate;
renderAll();
</script>
</body>
</html>
